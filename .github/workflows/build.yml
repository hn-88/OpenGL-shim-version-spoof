name: Build opengl32.dll shim

on: 
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build opengl32.dll
        run: |
          # Step 1: build a thin import lib that points at the *real* opengl32.dll
          # We rename it opengl32_real so the .def forwards resolve correctly.
          # The real DLL on the target machine is still called opengl32.dll —
          # the "real" name here is just a linker alias used at build time.
          x86_64-w64-mingw32-dlltool \
            --output-lib libopengl32_real.a \
            --dllname opengl32.dll \
            --def opengl32.def \
            --as-flags "--64"

          # Step 2: compile the shim, linking against our forwarding import lib
          x86_64-w64-mingw32-gcc \
            -shared \
            -o opengl32.dll \
            gl_shim.c \
            opengl32.def \
            -L. \
            -lopengl32_real \
            -Wall \
            -Wl,--enable-stdcall-fixup \
            -static-libgcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opengl32-shim
          path: opengl32.dll
