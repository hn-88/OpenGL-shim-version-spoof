name: Build OpenGL + GLFW shims

on:  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build opengl32.dll (version spoof)
        run: |
          x86_64-w64-mingw32-dlltool \
            --output-lib libopengl32_real.a \
            --dllname opengl32_real.dll \
            --def opengl32.def \
            --as-flags "--64"

          x86_64-w64-mingw32-gcc \
            -shared \
            -o opengl32.dll \
            gl_shim.c \
            opengl32.def \
            -L. \
            -lopengl32_real \
            -Wall \
            -Wl,--enable-stdcall-fixup \
            -static-libgcc

      - name: Build glfw3.dll (context version clamp)
        run: |
          x86_64-w64-mingw32-gcc \
            -shared \
            -o glfw3.dll \
            glfw_shim.c \
            glfw3.def \
            -Wall \
            -Wl,--enable-stdcall-fixup \
            -static-libgcc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openspace-vmware-shims
          path: |
            opengl32.dll
            glfw3.dll
